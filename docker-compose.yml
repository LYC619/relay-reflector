# API Log
# 使用 host 网络模式，容器直接共享宿主机网络

version: "3.8"

services:
  api-log:
    build: .
    network_mode: host
    environment:
      - UPSTREAM_URL=${UPSTREAM_URL:-http://127.0.0.1:3000}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-relay123}
      - PORT=${PORT:-7891}
    volumes:
      - api-log-data:/data
    restart: unless-stopped

volumes:
  api-log-data:
